<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Voucher Metropol V5</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

.logo{
    max-height:100px;
}

.card-voucher{
    border-radius:15px;
    border:none;
}

.titulo{
    color:#c62828;
    font-weight:700;
}

#vistaPrevia{
    display:none;
}

</style>

</head>

<body>

<div class="container mt-4">

    <div class="card shadow card-voucher">

        <div class="card-body">

            <div class="row align-items-center">

                <div class="col-md-2 text-center">

                    <img
                        src="/static/logo_metropol.png"
                        class="logo">

                </div>

                <div class="col-md-10">

                    <h2 class="titulo">
                        Voucher Anexo 5 IP
                    </h2>

                    <p class="text-muted">
                        Sistema Operacional Metropol
                    </p>

                </div>

            </div>

            <hr>

            <div class="row">

                <div class="col-md-3 mb-3">

                    <label class="form-label">
                        Unidad
                    </label>

                    <select
                        id="unidad"
                        class="form-select">

                        <option value="">
                            Seleccione
                        </option>

                        {% for u in unidades %}
                        <option value="{{u}}">
                            {{u}}
                        </option>
                        {% endfor %}

                    </select>

                </div>

                <div class="col-md-3 mb-3">

                    <label class="form-label">
                        Terminal
                    </label>

                    <select
                        id="terminal"
                        class="form-select">
                    </select>

                </div>

                <div class="col-md-3 mb-3">

                    <label class="form-label">
                        Tipo Día
                    </label>

                    <select
                        id="tipo_dia"
                        class="form-select">

                        <option value="">
                            Seleccione
                        </option>

                        {% for td in tipos_dia %}
                        <option value="{{td}}">
                            {{td}}
                        </option>
                        {% endfor %}

                    </select>

                </div>

                <div class="col-md-3 mb-3">

                    <label class="form-label">
                        Servicio
                    </label>

                    <select
                        id="servicio"
                        class="form-select">
                    </select>

                </div>

            </div>

            <div class="row">

                <div class="col-md-4 mb-3">

                    <label class="form-label">
                        Hora de Salida
                    </label>

                    <input
                        type="text"
                        id="salida"
                        class="form-control"
                        placeholder="00:30:00 o TODO">

                </div>

            </div>

            <div class="d-flex gap-2">

    <button
        class="btn btn-primary"
        onclick="vistaPrevia()">

        Vista Previa

    </button>

    <button
        class="btn btn-success"
        onclick="generarPDF()">

        Generar PDF

    </button>

    <button
        class="btn btn-secondary"
        onclick="imprimirVista()">

        Imprimir

    </button>

</div>



            </div>

        </div>

    </div>

    <div
        id="vistaPrevia"
        class="card shadow mt-4">

        <div
            class="card-header text-white"
            style="background:#c62828;">

            <h4 class="mb-0">
                Voucher Anexo 5 IP
            </h4>

        </div>

        <div class="card-body">

            <div class="row mb-4">

                <div class="col-md-2">
                    <strong>Unidad</strong>
                    <div id="vpUnidad"></div>
                </div>

                <div class="col-md-3">
                    <strong>Terminal</strong>
                    <div id="vpTerminal"></div>
                </div>

                <div class="col-md-3">
                    <strong>Servicio</strong>
                    <div id="vpServicio"></div>
                </div>

                <div class="col-md-2">
                    <strong>Tipo Día</strong>
                    <div id="vpTipoDia"></div>
                </div>

                <div class="col-md-2">
                    <strong>Salida</strong>
                    <div id="vpSalida"></div>
                </div>

            </div>

            <table class="table table-bordered">

                <thead class="table-dark">

                    <tr>

                        <th>Hora Salida</th>
                        <th>Código</th>
                        <th>Nombre Paradero</th>
                        <th>Hora Pasada</th>

                    </tr>

                </thead>

                <tbody id="tbodyVoucher">

                </tbody>

            </table>

        </div>

    </div>

</div>

<script>

const unidad =
document.getElementById("unidad");

const terminal =
document.getElementById("terminal");

const tipoDia =
document.getElementById("tipo_dia");

const servicio =
document.getElementById("servicio");


unidad.addEventListener(
"change",
async () => {

    terminal.innerHTML = "";

    const r = await fetch(
        "/terminales/" +
        encodeURIComponent(unidad.value)
    );

    const datos = await r.json();

    datos.forEach(item => {

        const op =
        document.createElement("option");

        op.value = item;
        op.textContent = item;

        terminal.appendChild(op);

    });

}
);

function imprimirVista(){

    const salida =
        document.getElementById("salida").value || "TODO";

    const url =
        "/voucher-pdf/" +
        encodeURIComponent(unidad.value) +
        "/" +
        encodeURIComponent(terminal.value) +
        "/" +
        encodeURIComponent(tipoDia.value) +
        "/" +
        encodeURIComponent(servicio.value) +
        "/" +
        encodeURIComponent(salida);

    const ventana = window.open(
        url,
        "_blank"
    );

    setTimeout(() => {

        ventana.print();

    }, 1000);

}
async function cargarServicios(){

    if(
        !unidad.value ||
        !terminal.value ||
        !tipoDia.value
    ){
        return;
    }

    servicio.innerHTML="";

const opTodos =
document.createElement("option");

opTodos.value = "TODOS";
opTodos.textContent = "TODOS";

servicio.appendChild(opTodos);

const r = await fetch(
    "/servicios/" +
    encodeURIComponent(unidad.value)
    + "/" +
    encodeURIComponent(terminal.value)
    + "/" +
    encodeURIComponent(tipoDia.value)
);

const datos = await r.json();

datos.forEach(item => {

    const op =
    document.createElement("option");

    op.value = item;
    op.textContent = item;

    servicio.appendChild(op);

});
    

}

terminal.addEventListener(
"change",
cargarServicios
);

tipoDia.addEventListener(
"change",
cargarServicios
);


async function vistaPrevia(){

    const salida =
    document.getElementById(
        "salida"
    ).value;

    const r = await fetch(
        "/voucher/" +
        encodeURIComponent(unidad.value)
        + "/" +
        encodeURIComponent(terminal.value)
        + "/" +
        encodeURIComponent(tipoDia.value)
        + "/" +
        encodeURIComponent(servicio.value)
        + "/" +
        encodeURIComponent(salida)
    );

    const datos = await r.json();

    document.getElementById(
        "vistaPrevia"
    ).style.display = "block";

    document.getElementById(
        "vpUnidad"
    ).textContent = unidad.value;

    document.getElementById(
        "vpTerminal"
    ).textContent = terminal.value;

    document.getElementById(
        "vpServicio"
    ).textContent = servicio.value;

    document.getElementById(
        "vpTipoDia"
    ).textContent = tipoDia.value;

    document.getElementById(
        "vpSalida"
    ).textContent = salida;

    const tbody =
    document.getElementById(
        "tbodyVoucher"
    );

    tbody.innerHTML = "";

    datos.forEach(item => {

        tbody.innerHTML += `
        <tr>
            <td>${item["HORARIO DE SALIDA DESDE CABEZAL"]}</td>
            <td>${item["CODIGO PARADERO USUARIO"]}</td>
            <td>${item["NOMBRE PARADERO"]}</td>
            <td>${item["HORARIO DE PASADA PARADERO"]}</td>
        </tr>
        `;

    });

}

function generarPDF(){

    const salida =
        document.getElementById("salida").value || "TODO";

    const url =
        "/voucher-pdf/" +
        encodeURIComponent(unidad.value) +
        "/" +
        encodeURIComponent(terminal.value) +
        "/" +
        encodeURIComponent(tipoDia.value) +
        "/" +
        encodeURIComponent(servicio.value) +
        "/" +
        encodeURIComponent(salida);

    window.open(
        url,
        "_blank"
    );

}
</script>

</body>
</html>
